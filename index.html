<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AVGAX AI | v4.0 ULTRA</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        /* Klavye tavsiyesi: dvh kullanımı */
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: white; overflow: hidden; height: 100dvh; display: flex; flex-direction: column; }
        .chat-container { flex: 1; overflow-y: auto; scrollbar-width: thin; scrollbar-color: #334155 transparent; }
        .user-msg { background: #1e293b; color: #f1f5f9; border-radius: 18px 18px 2px 18px; border: 1px solid #334155; }
        .ai-msg { background: #2563eb; color: white; border-radius: 18px 18px 18px 2px; box-shadow: 0 4px 20px rgba(37, 99, 235, 0.4); }
        .ultra-glow { box-shadow: 0 0 25px rgba(37, 99, 235, 0.6); }
        /* Geçmiş Paneli Stili */
        #history-sidebar { transition: transform 0.3s ease; transform: translateX(-100%); z-index: 50; }
        #history-sidebar.open { transform: translateX(0); }
    </style>
</head>
<body class="bg-slate-950">

    <div id="history-sidebar" class="fixed inset-y-0 left-0 w-64 bg-slate-900 border-r border-slate-800 p-4 shadow-2xl">
        <div class="flex justify-between items-center mb-6">
            <h2 class="font-bold text-indigo-400">ESKİ SOHBETLER</h2>
            <button onclick="toggleHistory()" class="text-slate-400"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div id="history-list" class="space-y-2 overflow-y-auto max-h-[80vh]">
            </div>
    </div>

    <header class="p-4 bg-slate-900/80 backdrop-blur-md border-b border-slate-800 flex justify-between items-center px-6">
        <div class="flex items-center gap-3 cursor-pointer" onclick="toggleHistory()">
            <div class="w-10 h-10 bg-gradient-to-br from-blue-600 to-indigo-600 rounded-xl flex items-center justify-center text-white font-bold shadow-lg ultra-glow">A</div>
            <div>
                <h1 class="font-bold text-slate-100 tracking-tight">AVGAX AI</h1>
                <span class="text-[10px] text-indigo-400 font-bold uppercase tracking-widest">by: @dgnemre_04</span>
            </div>
        </div>
        <button onclick="clearChat()" class="text-slate-500 hover:text-red-400 transition-all flex items-center gap-2 text-xs font-bold bg-slate-800 py-2 px-3 rounded-lg">
            <i class="fa-solid fa-trash-can"></i> GEÇMİŞİ TEMİZLE
        </button>
    </header>

    <main id="chat-box" class="p-4 md:p-8 space-y-6 chat-container"></main>

    <footer class="p-4 bg-slate-900 border-t border-slate-800">
        <div class="max-w-4xl mx-auto relative">
            <div id="status-msg" class="hidden text-xs text-indigo-400 mb-2 animate-pulse font-mono font-bold">>> SCOUT_MODEL_YANITLIYOR...</div>
            <div class="flex items-center gap-2 bg-slate-800/50 rounded-2xl p-2 border border-slate-700 focus-within:border-indigo-500 transition-all">
                <input id="user-input" type="text" placeholder="AVGAX Scout'a bir komut ver..." class="flex-1 bg-transparent border-none outline-none px-3 py-2 text-slate-200">
                <button onclick="sendMessage()" class="bg-indigo-600 text-white w-11 h-11 rounded-xl flex items-center justify-center hover:bg-indigo-500 active:scale-90 transition-all shadow-lg">
                    <i class="fa-solid fa-bolt"></i>
                </button>
            </div>
        </div>
    </footer>

    <script>
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const statusMsg = document.getElementById('status-msg');
        const historySidebar = document.getElementById('history-sidebar');
        const historyList = document.getElementById('history-list');

        const API_KEY = "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"; 
        const API_URL = "https://api.groq.com/openai/v1/chat/completions";
        const MODEL_NAME = "llama-3.3-70b-versatile"; 

        const bugun = new Date().toLocaleDateString('tr-TR', { day: 'numeric', month: 'long', year: 'numeric', weekday: 'long' });

        // LocalStorage'dan geçmişi yükle veya yeni başlat
        let chatHistory = JSON.parse(localStorage.getItem('avgax_history')) || [
            { role: "system", content: `Senin adın AVGAX. Sahibin ve yapımcın @dgnemre_04. Bugünün tarihi: ${bugun}.Her cevap verdiğinde tarihi söylemene gerek yok.` }
        ];

        function saveHistory() {
            localStorage.setItem('avgax_history', JSON.stringify(chatHistory));
            updateSidebar();
        }

        function toggleHistory() {
            historySidebar.classList.toggle('open');
        }

        function updateSidebar() {
            historyList.innerHTML = '';
            // Sadece kullanıcı mesajlarını geçmişte göster
            chatHistory.filter(msg => msg.role === 'user').forEach(msg => {
                const item = document.createElement('div');
                item.className = "p-3 bg-slate-800 rounded-lg text-xs text-slate-300 truncate border border-slate-700";
                item.innerText = msg.content;
                historyList.appendChild(item);
            });
        }

        function appendMessage(role, text) {
            const wrapper = document.createElement('div');
            wrapper.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} w-full animate-in fade-in slide-in-from-bottom-2 duration-300`;
            const msgDiv = document.createElement('div');
            msgDiv.className = `max-w-[85%] p-4 ${role === 'user' ? 'user-msg' : 'ai-msg'}`;
            msgDiv.innerText = text;
            wrapper.appendChild(msgDiv);
            chatBox.appendChild(wrapper);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // Başlangıçta kayıtlı mesajları ekrana bas
        function loadChat() {
            chatBox.innerHTML = '';
            chatHistory.forEach(msg => {
                if(msg.role !== 'system') appendMessage(msg.role, msg.content);
            });
            if(chatHistory.length <= 1) {
                appendMessage('ai', `AVGAX ULTRA hazır. Bugün ${bugun}. Size nasıl yardımcı olabilirim?`);
            }
            updateSidebar();
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            appendMessage('user', text);
            userInput.value = '';
            statusMsg.classList.remove('hidden');

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${API_KEY}` },
                    body: JSON.stringify({
                        model: MODEL_NAME,
                        messages: chatHistory.concat({ role: "user", content: text }),
                        temperature: 0.5
                    })
                });

                const data = await response.json();
                const aiResponse = data.choices[0].message.content;
                
                statusMsg.classList.add('hidden');
                appendMessage('ai', aiResponse);

                chatHistory.push({ role: "user", content: text });
                chatHistory.push({ role: "assistant", content: aiResponse });
                saveHistory();

            } catch (error) {
                statusMsg.classList.add('hidden');
                appendMessage('ai', "Hata: " + error.message);
            }
        }

        function clearChat() {
            if(confirm("Tüm sohbet geçmişi silinecek. Emin misin?")) {
                localStorage.removeItem('avgax_history');
                chatHistory = [{ role: "system", content: `Senin adın AVGAX. Sahibin ve yapımcın @dgnemre_04.` }];
                chatBox.innerHTML = '';
                appendMessage('ai', "Bellek ve geçmiş temizlendi.");
                updateSidebar();
            }
        }

        userInput.addEventListener("keypress", (e) => { if (e.key === "Enter") sendMessage(); });
        window.onload = loadChat;
    </script>
</body>
</html>
