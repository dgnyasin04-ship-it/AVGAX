<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AVGAX AI | ULTRA</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <link rel="manifest" href="manifest.json">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #000; color: white; overflow: hidden; height: 100dvh; display: flex; flex-direction: column; }
        .chat-container { flex: 1; overflow-y: auto; padding-bottom: 20px; }
        .user-msg { background: #1e293b; color: #f1f5f9; border-radius: 18px 18px 2px 18px; border: 1px solid #334155; }
        .ai-msg { background: #2563eb; color: white; border-radius: 18px 18px 18px 2px; position: relative; }
        #auth-screen { position: fixed; inset: 0; background: #020617; z-index: 20000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: #0f172a; border: 1px solid #1e293b; padding: 2rem; border-radius: 24px; width: 100%; max-width: 400px; }
        #sidebar { transition: transform 0.4s; transform: translateX(-100%); z-index: 100; width: 280px; }
        #sidebar.open { transform: translateX(0); }
        #admin-panel, #user-settings-modal, #dm-modal { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.98); z-index: 11000; display: none; flex-direction: column; padding: 2rem; backdrop-filter: blur(15px); }
        .app-logo { width: 42px; height: 42px; border-radius: 10px; object-fit: cover; }
        .preview-img { max-height: 100px; border-radius: 10px; border: 2px solid #2563eb; }
        .dm-bubble { max-width: 80%; padding: 10px 14px; border-radius: 15px; font-size: 13px; margin-bottom: 8px; word-wrap: break-word; }
        .dm-sent { background: #4f46e5; align-self: flex-end; border-radius: 15px 15px 2px 15px; }
        .dm-received { background: #1e293b; align-self: flex-start; border-radius: 15px 15px 15px 2px; border: 1px solid #334155; }
    </style>
</head>
<body class="bg-slate-950">

    <div id="auth-screen">
        <div class="auth-card text-center">
            <img src="1577.jpg" class="w-20 h-20 rounded-2xl mx-auto mb-4 border-2 border-indigo-500">
            <h1 class="text-2xl font-bold mb-2">AVGAX AI ULTRA</h1>
            <p class="text-slate-400 text-sm mb-6" id="auth-title">Giriş yapın</p>
            <div class="space-y-3 text-left">
                <input id="auth-email" type="email" placeholder="E-posta" class="w-full bg-slate-900 border border-slate-800 rounded-xl p-3 text-sm text-white outline-none focus:border-indigo-500">
                <div id="register-fields" class="hidden space-y-3">
                    <input id="auth-username" type="text" placeholder="Kullanıcı Adı" class="w-full bg-slate-900 border border-slate-800 rounded-xl p-3 text-sm text-white outline-none focus:border-indigo-500">
                    <input id="auth-phone" type="tel" placeholder="Telefon No" class="w-full bg-slate-900 border border-slate-800 rounded-xl p-3 text-sm text-white outline-none focus:border-indigo-500">
                </div>
                <input id="auth-pass" type="password" placeholder="Şifre" class="w-full bg-slate-900 border border-slate-800 rounded-xl p-3 text-sm text-white outline-none focus:border-indigo-500">
                <button onclick="handleAuth()" id="auth-btn" class="w-full bg-indigo-600 p-4 rounded-xl font-bold mt-4 uppercase">Giriş Yap</button>
                <p class="text-center text-xs text-slate-500 mt-4 cursor-pointer hover:text-indigo-400" onclick="toggleAuthMode()" id="auth-toggle-text">Hesabın yok mu? Kayıt Ol</p>
            </div>
        </div>
    </div>

    <div id="main-app" class="hidden flex flex-col h-full">
        <div id="dm-modal">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-indigo-400">MESAJLAR (DM)</h2>
                <button onclick="toggleDM()" class="text-white bg-slate-800 h-10 w-10 rounded-full">✕</button>
            </div>
            <div class="flex flex-col md:flex-row gap-4 h-full overflow-hidden pb-10">
                <div id="dm-user-list" class="w-full md:w-1/3 bg-slate-900/50 rounded-2xl p-4 overflow-y-auto border border-slate-800">
                    <p class="text-[10px] text-slate-500 mb-4 uppercase font-bold">Kişiler</p>
                    <div id="dm-users-container" class="space-y-2"></div>
                </div>
                <div id="dm-chat-window" class="hidden w-full md:w-2/3 bg-slate-900/50 rounded-2xl flex flex-col border border-slate-800">
                    <div id="dm-target-header" class="p-4 border-b border-slate-800 font-bold text-indigo-400 text-sm"></div>
                    <div id="dm-messages-container" class="flex-1 overflow-y-auto p-4 flex flex-col"></div>
                    <div class="p-4 flex gap-2">
                        <input id="dm-input" type="text" placeholder="Mesaj yaz..." class="flex-1 bg-slate-950 border border-slate-700 rounded-xl px-4 text-sm text-white outline-none">
                        <button onclick="sendDirectMessage()" class="bg-indigo-600 h-10 w-10 rounded-xl flex items-center justify-center"><i class="fa-solid fa-paper-plane"></i></button>
                    </div>
                </div>
            </div>
        </div>
        
        <div id="user-settings-modal">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-bold text-indigo-400">AYARLAR</h2>
                <button onclick="toggleUserSettings()" class="text-white bg-slate-800 h-10 w-10 rounded-full">✕</button>
            </div>
            <div class="space-y-6 max-w-xl mx-auto w-full">
                <div class="bg-slate-900/50 p-6 rounded-2xl border border-slate-800 text-center">
                    <p class="text-indigo-400 font-bold mb-1" id="display-username"></p>
                    <p class="text-slate-400 text-xs mb-4"><span id="current-user-email"></span></p>
                    <button onclick="logout()" class="text-red-400 text-xs font-bold bg-red-500/10 px-4 py-2 rounded-lg border border-red-500/20">ÇIKIŞ YAP</button>
                </div>
                <div class="bg-slate-900/50 p-6 rounded-2xl border border-slate-800 text-white">
                    <label class="block text-sm font-bold mb-4">SICAKLIK (0:Ciddi - 2:Yaratıcı) <span id="temp-val" class="text-indigo-400">0.5</span></label>
                    <input type="range" id="temp-slider" min="0" max="2" step="0.1" value="0.5" class="w-full" oninput="document.getElementById('temp-val').innerText=this.value">
                </div>
                <button onclick="toggleUserSettings()" class="w-full bg-indigo-600 p-4 rounded-2xl font-bold">KAYDET</button>
            </div>
        </div>

        <div id="admin-panel">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-bold text-indigo-400 uppercase">Yönetim Paneli</h2>
                <button onclick="closeAdmin()" class="bg-slate-800 h-10 w-10 rounded-full">✕</button>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 overflow-y-auto pr-2">
                <div class="space-y-4">
                    <h3 class="text-sm font-bold text-slate-500 uppercase">Sistem Ayarları</h3>
                    <textarea id="admin-prompt" class="w-full bg-slate-950 border border-slate-700 rounded-xl p-4 h-24 text-sm" placeholder="Sistem Komutu"></textarea>
                    <input id="admin-key" type="password" class="w-full bg-slate-950 border border-slate-700 rounded-xl p-4 text-sm" placeholder="Groq API Key">
                    <button onclick="saveAdminSettings()" class="w-full bg-indigo-600 p-3 rounded-xl font-bold text-sm">SİSTEMİ GÜNCELLE</button>
                </div>
                <div class="space-y-4">
                    <h3 class="text-sm font-bold text-slate-500 uppercase">Kullanıcı Yönetimi</h3>
                    <div id="admin-user-list" class="space-y-2 max-h-[500px] overflow-y-auto"></div>
                </div>
            </div>
        </div>

        <header class="p-4 bg-slate-900 border-b border-slate-800 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <button onclick="toggleSidebar()" class="p-2 text-slate-400"><i class="fa-solid fa-bars-staggered"></i></button>
                <img src="1577.jpg" class="app-logo">
                <span class="font-bold tracking-tight">AVGAX AI</span>
            </div>
            <div class="flex items-center gap-2">
                <button id="admin-btn" onclick="openAdmin()" class="hidden p-3 bg-red-500/10 text-red-500 rounded-xl border border-red-500/20"><i class="fa-solid fa-user-shield"></i></button>
                <button onclick="toggleDM()" class="p-3 bg-indigo-500/10 rounded-xl text-indigo-400 border border-indigo-500/20"><i class="fa-solid fa-comments"></i></button>
                <button onclick="toggleUserSettings()" class="p-3 bg-slate-800/50 rounded-xl text-slate-400"><i class="fa-solid fa-sliders"></i></button>
            </div>
        </header>

        <div id="sidebar" class="fixed inset-y-0 left-0 bg-slate-900 border-r border-slate-800 flex flex-col">
            <div class="p-4 border-b border-slate-800 flex justify-between items-center">
                <span class="font-bold text-indigo-400 uppercase tracking-widest text-xs">Sohbet Geçmişi</span>
                <button onclick="toggleSidebar()"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <button onclick="createNewChat()" class="m-4 p-3 bg-indigo-600 rounded-xl font-bold text-sm">+ Yeni Sohbet</button>
            <div id="chat-list" class="flex-1 overflow-y-auto px-2 space-y-1"></div>
            <div class="p-6 border-t border-slate-800 text-[10px] text-slate-500 text-center uppercase">DEVELOPED BY: <span class="text-indigo-400">@DGNEMRE_04</span></div>
        </div>
        
        <main id="chat-box" class="p-4 md:p-8 space-y-6 chat-container"></main>

        <footer class="p-4 bg-slate-900 border-t border-slate-800">
            <div class="max-w-4xl mx-auto">
                <div id="image-preview-container" class="hidden mb-2 p-2 bg-slate-800 rounded-xl flex items-center gap-4">
                    <img id="image-preview" src="" class="preview-img">
                    <button onclick="clearImage()" class="text-red-500 bg-red-500/10 p-2 rounded-lg">✕ Sil</button>
                </div>
                <div id="status-msg" class="hidden text-[10px] text-indigo-400 mb-2 animate-pulse font-bold uppercase">AVGAX İŞLİYOR...</div>
                <div class="flex items-center gap-2 bg-slate-800/40 rounded-2xl p-2 border border-slate-700">
                    <button onclick="document.getElementById('image-input').click()" class="p-3 text-slate-400 hover:text-indigo-400 transition-colors shrink-0">
                        <i class="fa-solid fa-paperclip"></i>
                    </button>
                    <input type="file" id="image-input" accept="image/*" class="hidden" onchange="handleImageSelect(event)">
                    <input id="user-input" type="text" placeholder="Mesaj yaz veya görsel at..." class="flex-1 bg-transparent border-none outline-none py-3 px-2 text-sm text-white min-w-0">
                    <select id="footer-model" class="bg-slate-700 text-[10px] text-white rounded-lg px-2 h-10 outline-none border border-slate-600 shrink-0">
                        <option value="llama-3.3-70b-versatile">70B</option>
                        <option value="llama-3.1-8b-instant">8B</option>
                        <option value="llama-3.2-11b-vision-preview">VISION</option>
                    </select>
                    <button onclick="sendMessage()" class="bg-indigo-600 text-white w-12 h-12 rounded-xl flex items-center justify-center shrink-0">
                        <i class="fa-solid fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </footer>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBIBj5S4_jSwxXvdY86k2gMzcdquL5cW-M",
            authDomain: "avgax-ai.firebaseapp.com",
            projectId: "avgax-ai",
            storageBucket: "avgax-ai.firebasestorage.app",
            messagingSenderId: "743484503071",
            appId: "1:743484503071:web:480e126803c1775148112a",
            measurementId: "G-W6K1GTZ58S"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let isLoginMode = true;
        let currentUser = null;
        let userData = null;
        let allChats = [];
        let currentChatId = null;
        let selectedImageData = null;
        
        let selectedDmUserId = null;
        let dmListener = null;

        function toggleAuthMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-title').innerText = isLoginMode ? "Giriş yapın" : "Yeni ULTRA hesabı oluşturun";
            document.getElementById('auth-btn').innerText = isLoginMode ? "Giriş Yap" : "Kayıt Ol";
            document.getElementById('register-fields').classList.toggle('hidden', isLoginMode);
            document.getElementById('auth-toggle-text').innerText = isLoginMode ? "Hesabın yok mu? Kayıt Ol" : "Zaten bir hesabın var mı? Giriş Yap";
        }

        async function handleAuth() {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            const username = document.getElementById('auth-username').value;
            const phone = document.getElementById('auth-phone').value;
            try {
                if(isLoginMode) { 
                    await auth.signInWithEmailAndPassword(email, pass);
                }
                else {
                    if(!username) return alert("Kullanıcı adı zorunludur!");
                    const userCred = await auth.createUserWithEmailAndPassword(email, pass);
                    await userCred.user.sendEmailVerification();
                    await db.collection('users').doc(userCred.user.uid).set({
                        username: username, phone: phone || "Belirtilmedi", email: email, isAdmin: false, isBanned: false, createdAt: Date.now()
                    });
                    alert("Kayıt başarılı! Doğrulama linki e-postanıza gönderildi.");
                    await auth.signOut(); 
                    toggleAuthMode();
                }
            } catch(e) { alert("Hata: " + e.message); }
        }

        auth.onAuthStateChanged(async (user) => {
            if (user) {
                let doc = await db.collection('users').doc(user.uid).get();
                
                if(!doc.exists) {
                    await db.collection('users').doc(user.uid).set({
                        username: user.email.split('@')[0], email: user.email, isAdmin: false, isBanned: false, createdAt: Date.now()
                    });
                    doc = await db.collection('users').doc(user.uid).get();
                }

                userData = doc.data();
                
                // BAN SÜRESİ KONTROLÜ
                const now = Date.now();
                let currentlyBanned = userData?.isBanned;
                
                if (userData?.banUntil) {
                    if (userData.banUntil > now) {
                        currentlyBanned = true;
                    } else {
                        // Süre dolmuşsa banı otomatik kaldır
                        await db.collection('users').doc(user.uid).update({ 
                            isBanned: false, 
                            banUntil: firebase.firestore.FieldValue.delete() 
                        });
                        currentlyBanned = false;
                    }
                }
                
                if(currentlyBanned) { 
                    let msg = "Hesabınız kalıcı olarak engellendi!";
                    if(userData?.banUntil && userData.banUntil > now) {
                        msg = `Hesabınız geçici olarak engellendi.\nBan Bitiş: ${new Date(userData.banUntil).toLocaleString('tr-TR')}`;
                    }
                    alert(msg); 
                    auth.signOut(); 
                    return; 
                }
                
                currentUser = user;
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('display-username').innerText = userData?.username || "Kullanıcı";
                document.getElementById('current-user-email').innerText = user.email;

                if(userData?.isAdmin || user.email === "dgnyasin04@gmail.com") {
                    const adminBtn = document.getElementById('admin-btn');
                    if(adminBtn) adminBtn.classList.remove('hidden');
                }
                loadChatsFromULTRA();
            } else {
                document.getElementById('auth-screen').style.display = 'flex';
                document.getElementById('main-app').classList.add('hidden');
            }
        });

        // DM MANTIGI
        function toggleDM() {
            const m = document.getElementById('dm-modal');
            const isOpening = m.style.display !== 'flex';
            m.style.display = isOpening ? 'flex' : 'none';
            if(isOpening) loadDMUsers();
        }

        async function loadDMUsers() {
            try {
                const snap = await db.collection('users').get();
                const container = document.getElementById('dm-users-container');
                container.innerHTML = '';
                snap.forEach(doc => {
                    if(doc.id === currentUser.uid) return;
                    const u = doc.data();
                    const div = document.createElement('div');
                    div.className = "p-3 bg-slate-800/50 rounded-xl text-xs cursor-pointer hover:bg-indigo-600/20 border border-slate-700 transition-all";
                    div.innerHTML = `<p class="font-bold">${u.username || 'Adsız Kullanıcı'}</p><p class="text-[10px] text-slate-500">${u.email}</p>`;
                    div.onclick = () => selectDMUser(doc.id, u.username || 'Kullanıcı');
                    container.appendChild(div);
                });
            } catch(e) { console.error("Kullanıcılar yüklenemedi:", e); }
        }

        function selectDMUser(id, name) {
            selectedDmUserId = id;
            document.getElementById('dm-chat-window').classList.remove('hidden');
            document.getElementById('dm-target-header').innerText = `${name} ile Mesajlaşma`;
            if(dmListener) dmListener(); 
            
            const chatId = [currentUser.uid, id].sort().join('_');
            dmListener = db.collection('direct_messages')
                .where('chatId', '==', chatId)
                .orderBy('timestamp', 'asc')
                .onSnapshot(snap => {
                    const container = document.getElementById('dm-messages-container');
                    container.innerHTML = '';
                    snap.forEach(doc => {
                        const m = doc.data();
                        const msgDiv = document.createElement('div');
                        msgDiv.className = `dm-bubble ${m.senderId === currentUser.uid ? 'dm-sent' : 'dm-received'}`;
                        msgDiv.innerText = m.text;
                        container.appendChild(msgDiv);
                    });
                    container.scrollTop = container.scrollHeight;
                });
        }

        async function sendDirectMessage() {
            const input = document.getElementById('dm-input');
            const text = input.value.trim();
            if(!text || !selectedDmUserId) return;
            
            const chatId = [currentUser.uid, selectedDmUserId].sort().join('_');
            try {
                await db.collection('direct_messages').add({
                    chatId, senderId: currentUser.uid, receiverId: selectedDmUserId, text, timestamp: Date.now() 
                });
                input.value = '';
            } catch(e) { alert("Mesaj gönderilemedi: " + e.message); }
        }

        function handleImageSelect(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    selectedImageData = e.target.result;
                    document.getElementById('image-preview').src = selectedImageData;
                    document.getElementById('image-preview-container').classList.remove('hidden');
                    document.getElementById('footer-model').value = 'llama-3.2-11b-vision-preview';
                };
                reader.readAsDataURL(file);
            }
        }
        
        function clearImage() {
            selectedImageData = null;
            document.getElementById('image-preview-container').classList.add('hidden');
            document.getElementById('image-input').value = '';
            document.getElementById('footer-model').value = 'llama-3.3-70b-versatile';
        }

        // ADMIN PANEL MANTIGI GÜNCELLENDİ
        async function openAdmin() {
            if(userData?.isAdmin || currentUser?.email === "dgnyasin04@gmail.com") {
                document.getElementById('admin-panel').style.display = 'flex';
                document.getElementById('admin-prompt').value = localStorage.getItem('avgax_system_prompt') || "Sen AVGAX ULTRA'sın. Yapımcın ve sahibin Yasin Emre Doğan (@dgnemre04) 'dır...";
                document.getElementById('admin-key').value = localStorage.getItem('avgax_api_key') || "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";
                
                try {
                    const usersSnap = await db.collection('users').get();
                    const listDiv = document.getElementById('admin-user-list');
                    listDiv.innerHTML = '';
                    
                    usersSnap.forEach(doc => {
                        const u = doc.data(); const id = doc.id;
                        if(id === currentUser.uid) return;
                        
                        const now = Date.now();
                        let isCurrentlyBanned = u.isBanned;
                        let banText = "";
                        
                        if (u.banUntil && u.banUntil > now) {
                            isCurrentlyBanned = true;
                            const untilDate = new Date(u.banUntil).toLocaleString('tr-TR');
                            banText = `<p class="text-[10px] text-red-400 font-bold mt-1">Ban Bitiş: ${untilDate}</p>`;
                        } else if (u.isBanned && !u.banUntil) {
                            banText = `<p class="text-[10px] text-red-500 font-bold mt-1">Süresiz Banlı</p>`;
                        }

                        const item = document.createElement('div');
                        item.className = "bg-slate-900 p-3 rounded-xl border border-slate-800 flex flex-col gap-3 text-xs mb-2";
                        
                        let html = `
                            <div class="flex justify-between items-start">
                                <div>
                                    <p class="font-bold text-white">${u.username || 'Adsız'} ${u.isAdmin ? '<span class="text-yellow-400">⭐ ADMIN</span>' : ''}</p>
                                    <p class="text-slate-500">${u.email}</p>
                                    ${banText}
                                </div>
                            </div>
                            <div class="flex gap-2 flex-wrap">
                        `;

                        // Yetki Butonları
                        if (u.isAdmin) {
                            html += `<button onclick="toggleAdmin('${id}', false)" class="flex-1 p-2 rounded-lg bg-orange-500/10 text-orange-500 border border-orange-500/20 font-bold">Yetki Al</button>`;
                        } else {
                            html += `<button onclick="toggleAdmin('${id}', true)" class="flex-1 p-2 rounded-lg bg-green-500/10 text-green-500 border border-green-500/20 font-bold">Yetki Ver</button>`;
                        }

                        // Ban Butonları
                        if (isCurrentlyBanned) {
                            html += `<button onclick="unbanUser('${id}')" class="flex-1 p-2 rounded-lg bg-emerald-500/10 text-emerald-500 border border-emerald-500/20 font-bold">Banı Aç</button>`;
                        } else {
                            html += `<button onclick="banUser('${id}')" class="flex-1 p-2 rounded-lg bg-red-500/10 text-red-500 border border-red-500/20 font-bold">Ban At</button>`;
                        }

                        html += `</div>`;
                        item.innerHTML = html;
                        listDiv.appendChild(item);
                    });
                } catch(e) { console.error("Kullanıcılar yüklenemedi", e); }
            }
        }
                
        async function banUser(id) {
            const minStr = prompt("Kullanıcıyı kaç dakika banlamak istiyorsunuz?\n(Süresiz ban için 0 yazın veya boş bırakın)");
            if (minStr === null) return; // İptal edildi

            let updates = { isBanned: true, banUntil: null };
            const minutes = parseInt(minStr);
            
            if (!isNaN(minutes) && minutes > 0) {
                updates.banUntil = Date.now() + (minutes * 60 * 1000);
            }

            try {
                await db.collection('users').doc(id).update(updates);
                openAdmin();
            } catch(e) { alert("Hata: " + e.message); }
        }

        async function unbanUser(id) {
            if(confirm("Kullanıcının banını açmak istiyor musunuz?")) {
                try {
                    await db.collection('users').doc(id).update({ 
                        isBanned: false, 
                        banUntil: firebase.firestore.FieldValue.delete() 
                    });
                    openAdmin();
                } catch(e) { alert("Hata: " + e.message); }
            }
        }

        async function toggleAdmin(id, makeAdmin) {
            const msg = makeAdmin ? "Kullanıcıya admin yetkisi verilecek, emin misiniz?" : "Kullanıcının admin yetkisi alınacak, emin misiniz?";
            if(confirm(msg)) {
                try {
                    await db.collection('users').doc(id).update({ isAdmin: makeAdmin });
                    openAdmin();
                } catch(e) { alert("Hata: " + e.message); }
            }
        }

        function closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; }
        
        function saveAdminSettings() {
            localStorage.setItem('avgax_system_prompt', document.getElementById('admin-prompt').value);
            localStorage.setItem('avgax_api_key', document.getElementById('admin-key').value);
            alert("Sistem güncellendi!");
        }

        async function loadChatsFromULTRA() {
            try {
                const snap = await db.collection('users').doc(currentUser.uid).collection('chats').orderBy('timestamp', 'desc').get();
                allChats = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderList();
                if(allChats.length > 0) loadChat(allChats[0].id);
                else createNewChat();
            } catch(e) {}
        }

        async function deleteChat(id) {
            if(confirm("Silmek istiyor musun?")) {
                await db.collection('users').doc(currentUser.uid).collection('chats').doc(id).delete();
                allChats = allChats.filter(c => c.id !== id);
                if(currentChatId === id) { if(allChats.length > 0) loadChat(allChats[0].id); else createNewChat(); }
                renderList();
            }
        }

        async function createNewChat() {
            const id = Date.now().toString();
            const newChat = { title: "Yeni Sohbet", messages: [], timestamp: Date.now() };
            await db.collection('users').doc(currentUser.uid).collection('chats').doc(id).set(newChat);
            allChats.unshift({ id, ...newChat });
            currentChatId = id;
            renderList();
            document.getElementById('chat-box').innerHTML = '';
            appendMessage('ai', `AVGAX ULTRA Hazır.`, false);
        }

        function loadChat(id) {
            currentChatId = id;
            const chat = allChats.find(c => c.id === id);
            if(!chat) return;
            document.getElementById('chat-box').innerHTML = '';
            chat.messages.forEach(m => appendMessage(m.role === 'assistant' ? 'ai' : 'user', m.content, false));
            renderList();
        }

        function appendMessage(role, text, save = true) {
            const box = document.getElementById('chat-box');
            const wrap = document.createElement('div');
            wrap.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} w-full mb-4`;
            const div = document.createElement('div');
            div.className = `max-w-[85%] p-4 text-sm ${role === 'user' ? 'user-msg' : 'ai-msg shadow-lg'}`;
            div.innerHTML = role === 'ai' ? marked.parse(text) : text;
            wrap.appendChild(div); box.appendChild(wrap);
            box.scrollTop = box.scrollHeight;
            if(save && currentChatId) {
                const chat = allChats.find(c => c.id === currentChatId);
                if(!chat) return;
                chat.messages.push({role: role === 'ai' ? 'assistant' : 'user', content: text});
                if(role === 'user' && chat.title === "Yeni Sohbet") chat.title = text.substring(0,25);
                db.collection('users').doc(currentUser.uid).collection('chats').doc(currentChatId).update({messages: chat.messages, title: chat.title});
                renderList();
            }
        }

    async function sendMessage() {
    const input = document.getElementById('user-input');
    const textVal = input.value.trim();
    if(!textVal && !selectedImageData) return;

    let displayMsg = textVal;
    const tempImage = selectedImageData; 

    if(tempImage) displayMsg = `🖼️ [Görsel Paylaşıldı] ${textVal || 'Görseli incele.'}`;
    appendMessage('user', displayMsg);
    input.value = '';
    document.getElementById('status-msg').classList.remove('hidden');

    const key = localStorage.getItem('avgax_api_key') || "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";
    const currentModel = document.getElementById('footer-model').value;
    const baseSysPrompt = localStorage.getItem('avgax_system_prompt') || "Sen AVGAX ULTRA'sın...";
    const temp = parseFloat(document.getElementById('temp-slider').value);
    
    const now = new Date();
    const dateString = now.toLocaleDateString('tr-TR', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    const timeString = now.toLocaleTimeString('tr-TR');
    const sysPrompt = `${baseSysPrompt}\n\n[SİSTEM BİLGİSİ: Şu anki kesin tarih: ${dateString}, Saat: ${timeString}. Kullanıcı gün, saat, zaman veya tarih sorarsa hiçbir tahminde bulunmadan doğrudan bu sistem bilgisini kullanarak net ve doğru cevap ver.]`;

    let messages;
    if(tempImage) {
        const cleanBase64 = tempImage.includes(',') ? tempImage : `data:image/jpeg;base64,${tempImage}`;
        messages = [
            { role: "system", content: sysPrompt }, 
            { role: "user", content: [
                { type: "text", text: textVal || "Bu görseli açıkla." }, 
                { type: "image_url", image_url: { url: cleanBase64 } } 
            ]}
        ];
    } else {
        const chat = allChats.find(c => c.id === currentChatId);
        messages = [{role: "system", content: sysPrompt}].concat(chat.messages);
    }

    try {
        const targetUrl = "https://api.groq.com/openai/v1/chat/completions";
        // Dünyanın en kararlı çalışan CORS köprüsünü entegre ettik
        const proxyUrl = `https://cors-anywhere.herokuapp.com/${targetUrl}`;

        const res = await fetch(proxyUrl, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${key}`,
                'X-Requested-With': 'XMLHttpRequest'
            },
            body: JSON.stringify({ 
                model: tempImage ? "llama-3.2-11b-vision-preview" : currentModel, 
                temperature: temp, 
                messages: messages 
            })
        });

        // Eğer köprü "403 Forbidden" gibi bir hata dönerse yakala
        if (!res.ok) {
            if(res.status === 403) {
                throw new Error("Proxy izni gerekiyor! Lütfen tarayıcıdan cors-anywhere adresine gidip aktifleştirin.");
            }
            throw new Error(`Sunucu Hatası: ${res.status}`);
        }

        const data = await res.json();
        
        if (data.error) {
            throw new Error(data.error.message || "Groq sistem hatası.");
        }

        document.getElementById('status-msg').classList.add('hidden');
        appendMessage('ai', data.choices[0].message.content);
        if(tempImage) clearImage(); 
    } catch(e) { 
        document.getElementById('status-msg').classList.add('hidden');
        console.error("Hata:", e);
        appendMessage('ai', `İşlem Başarısız: ${e.message}`); 
    }
}

        function renderList() {
            document.getElementById('chat-list').innerHTML = allChats.map(c => `
                <div class="flex items-center justify-between p-3 mb-1 rounded-xl text-xs cursor-pointer transition-all ${c.id === currentChatId ? 'bg-indigo-600' : 'hover:bg-slate-800'}" onclick="loadChat('${c.id}')">
                    <span class="truncate pr-2">${c.title}</span>
                    <button onclick="event.stopPropagation(); deleteChat('${c.id}')" class="text-slate-400 hover:text-red-500"><i class="fa-solid fa-trash-can"></i></button>
                </div>
            `).join('');
        }

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
        function toggleUserSettings() { const m = document.getElementById('user-settings-modal'); m.style.display = (m.style.display === 'flex') ? 'none' : 'flex'; }
        
        document.getElementById('user-input').addEventListener("keypress", (e) => { if(e.key === 'Enter') sendMessage(); });
        document.getElementById('dm-input').addEventListener("keypress", (e) => { if(e.key === 'Enter') sendDirectMessage(); });
        
        marked.setOptions({ breaks: true });

        async function logout() {
            await auth.signOut();
            window.location.reload();
        }
    </script>
</body>
