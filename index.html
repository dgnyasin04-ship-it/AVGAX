<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVGAX AI | v4.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: white; overflow: hidden; }
        .chat-container { height: calc(100vh - 180px); scrollbar-width: thin; scrollbar-color: #334155 transparent; }
        .user-msg { background: #1e293b; color: #f1f5f9; border-radius: 18px 18px 2px 18px; border: 1px solid #334155; }
        .ai-msg { background: #2563eb; color: white; border-radius: 18px 18px 18px 2px; box-shadow: 0 4px 20px rgba(37, 99, 235, 0.4); }
        .ultra-glow { box-shadow: 0 0 25px rgba(37, 99, 235, 0.6); }
    </style>
</head>
<body class="flex flex-col h-screen">

    <header class="p-4 bg-slate-900/80 backdrop-blur-md border-b border-slate-800 flex justify-between items-center px-6">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-gradient-to-br from-blue-600 to-indigo-600 rounded-xl flex items-center justify-center text-white font-bold shadow-lg ultra-glow">A</div>
            <div>
                <h1 class="font-bold text-slate-100 tracking-tight">AVGAX AI</h1>
                <span class="text-[10px] text-indigo-400 font-bold uppercase tracking-widest">•by: @dgnemre_04</span>
            </div>
        </div>
        <button onclick="clearChat()" class="text-slate-500 hover:text-red-400 transition-all">
            <i class="fa-solid fa-power-off"></i>
        </button>
    </header>

    <main id="chat-box" class="flex-1 overflow-y-auto p-4 md:p-8 space-y-6 chat-container">
        </main>

    <footer class="p-4 bg-slate-900 border-t border-slate-800">
        <div class="max-w-4xl mx-auto relative">
            <div id="status-msg" class="hidden text-xs text-indigo-400 mb-2 animate-pulse font-mono font-bold">>> AVGAX_MODEL_YANITLIYOR...</div>
            <div class="flex items-center gap-2 bg-slate-800/50 rounded-2xl p-2 border border-slate-700 focus-within:border-indigo-500 transition-all">
                <input id="user-input" type="text" placeholder="AVGAX'a bir komut ver..." class="flex-1 bg-transparent border-none outline-none px-3 py-2 text-slate-200">
                <button onclick="sendMessage()" class="bg-indigo-600 text-white w-11 h-11 rounded-xl flex items-center justify-center hover:bg-indigo-500 active:scale-90 transition-all shadow-lg">
                    <i class="fa-solid fa-bolt"></i>
                </button>
            </div>
        </div>
    </footer>

    <script>
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const statusMsg = document.getElementById('status-msg');

        // --- GÜNCEL AYARLAR ---
        const API_KEY = "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"; 
        const API_URL = "https://api.groq.com/openai/v1/chat/completions";
        const MODEL_NAME = "llama-4-scout"; 
        // -----------------------

        // Dinamik Tarih Bilgisi
        const bugun = new Date().toLocaleDateString('tr-TR', { 
            day: 'numeric', 
            month: 'long', 
            year: 'numeric',
            weekday: 'long' 
        });

        let chatHistory = [
            { 
                role: "system", 
                content: `Senin adın AVGAX. Sahibin ve yapımcın @dgnemre_04'tür. En gelişmiş sürümümsün. Bugünün tarihi: ${bugun}. Tüm soruları bu tarihe göre cevapla ve doğruluğunu teyit et.` 
            }
        ];

        function appendMessage(role, text) {
            const wrapper = document.createElement('div');
            wrapper.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} w-full animate-in fade-in slide-in-from-bottom-2 duration-300`;
            const msgDiv = document.createElement('div');
            msgDiv.className = `max-w-[85%] p-4 ${role === 'user' ? 'user-msg' : 'ai-msg'}`;
            msgDiv.innerText = text;
            wrapper.appendChild(msgDiv);
            chatBox.appendChild(wrapper);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // Başlangıç Mesajı
        appendMessage('ai', `AVGAX v4.0 Scout sistemi çevrimiçi. Bugün ${bugun}. by:@dgnemre_04, görev için hazırım.`);

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            appendMessage('user', text);
            userInput.value = '';
            statusMsg.classList.remove('hidden');

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${API_KEY}`
                    },
                    body: JSON.stringify({
                        model: MODEL_NAME,
                        messages: [...chatHistory, { role: "user", content: text }],
                        temperature: 0.6
                    })
                });

                const data = await response.json();
                
                if (data.error) {
                    throw new Error(data.error.message);
                }

                const aiResponse = data.choices[0].message.content;
                statusMsg.classList.add('hidden');
                appendMessage('ai', aiResponse);

                chatHistory.push({ role: "user", content: text });
                chatHistory.push({ role: "assistant", content: aiResponse });

            } catch (error) {
                statusMsg.classList.add('hidden');
                appendMessage('ai', "Hata: " + error.message);
            }
        }

        function clearChat() {
            chatBox.innerHTML = '';
            chatHistory = chatHistory.slice(0, 1);
            appendMessage('ai', "Sistem sıfırlandı.");
        }

        userInput.addEventListener("keypress", (e) => { if (e.key === "Enter") sendMessage(); });
    </script>
</body>
</html>
