<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AVGAX AI | CLOUD</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #000; color: white; overflow: hidden; height: 100dvh; display: flex; flex-direction: column; }
        .chat-container { flex: 1; overflow-y: auto; padding-bottom: 20px; }
        .user-msg { background: #1e293b; color: #f1f5f9; border-radius: 18px 18px 2px 18px; border: 1px solid #334155; }
        .ai-msg { background: #2563eb; color: white; border-radius: 18px 18px 18px 2px; position: relative; }
        #auth-screen { position: fixed; inset: 0; background: #020617; z-index: 20000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: #0f172a; border: 1px solid #1e293b; padding: 2rem; border-radius: 24px; width: 100%; max-width: 400px; }
        #sidebar { transition: transform 0.4s; transform: translateX(-100%); z-index: 100; width: 280px; }
        #sidebar.open { transform: translateX(0); }
        #admin-panel, #user-settings-modal { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.98); z-index: 11000; display: none; flex-direction: column; padding: 2rem; backdrop-filter: blur(15px); }
        .app-logo { width: 42px; height: 42px; border-radius: 10px; object-fit: cover; }
        .code-wrapper { position: relative; margin: 10px 0; }
        .copy-code-btn { position: absolute; top: 12px; right: 12px; background: rgba(255,255,255,0.1); padding: 5px 10px; border-radius: 5px; font-size: 10px; cursor: pointer; }
    </style>
</head>
<body class="bg-slate-950">

    <div id="auth-screen">
        <div class="auth-card text-center">
            <img src="1577.jpg" class="w-20 h-20 rounded-2xl mx-auto mb-4 border-2 border-indigo-500">
            <h1 class="text-2xl font-bold mb-2">AVGAX AI CLOUD</h1>
            <p class="text-slate-400 text-sm mb-8" id="auth-title">Oturum açarak tüm cihazlardan erişin</p>
            <div class="space-y-4 text-left">
                <input id="auth-email" type="email" placeholder="E-posta" class="w-full bg-slate-900 border border-slate-800 rounded-xl p-3 text-sm outline-none focus:border-indigo-500">
                <input id="auth-pass" type="password" placeholder="Şifre" class="w-full bg-slate-900 border border-slate-800 rounded-xl p-3 text-sm outline-none focus:border-indigo-500">
                <button onclick="handleAuth()" id="auth-btn" class="w-full bg-indigo-600 p-4 rounded-xl font-bold mt-4">GİRİŞ YAP</button>
                <p class="text-center text-xs text-slate-500 mt-4 cursor-pointer hover:text-indigo-400" onclick="toggleAuthMode()" id="auth-toggle-text">Hesabın yok mu? Kayıt Ol</p>
            </div>
        </div>
    </div>

    <div id="main-app" class="hidden flex flex-col h-full">
        <div id="user-settings-modal">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-bold text-indigo-400">AYARLAR</h2>
                <button onclick="toggleUserSettings()" class="text-white bg-slate-800 h-10 w-10 rounded-full">✕</button>
            </div>
            <div class="space-y-6 max-w-xl mx-auto w-full">
                <div class="bg-slate-900/50 p-6 rounded-2xl border border-slate-800 text-center">
                    <p class="text-slate-300 mb-4"><span id="current-user-email"></span></p>
                    <button onclick="logout()" class="text-red-400 text-xs font-bold bg-red-500/10 px-4 py-2 rounded-lg border border-red-500/20">ÇIKIŞ YAP</button>
                </div>
                <div class="bg-slate-900/50 p-6 rounded-2xl border border-slate-800">
                    <label class="block text-sm font-bold mb-4">SICAKLIK (0:Ciddi - 2:Yaratıcı) <span id="temp-val" class="text-indigo-400">0.5</span></label>
                    <input type="range" id="temp-slider" min="0" max="2" step="0.1" value="0.5" class="w-full" oninput="document.getElementById('temp-val').innerText=this.value">
                </div>
                <button onclick="toggleUserSettings()" class="w-full bg-indigo-600 p-4 rounded-2xl font-bold">KAYDET</button>
            </div>
        </div>

        <div id="admin-panel">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-bold text-indigo-400">ADMİN PANELİ</h2>
                <button onclick="closeAdmin()" class="bg-slate-800 h-10 w-10 rounded-full">✕</button>
            </div>
            <div class="space-y-4 overflow-y-auto">
                <textarea id="admin-prompt" class="w-full bg-slate-950 border border-slate-700 rounded-xl p-4 h-32"></textarea>
                <select id="admin-model" class="w-full bg-slate-950 border border-slate-700 rounded-xl p-4">
                    <option value="llama-3.3-70b-versatile">Llama 3.3 70B</option>
                    <option value="llama-3.1-8b-instant">Llama 3.1 8B</option>
                </select>
                <input id="admin-key" type="password" class="w-full bg-slate-950 border border-slate-700 rounded-xl p-4" placeholder="API Key">
                <button onclick="saveAdminSettings()" class="w-full bg-indigo-600 p-4 rounded-2xl font-bold">SİSTEMİ GÜNCELLE</button>
            </div>
        </div>

        <div id="sidebar" class="fixed inset-y-0 left-0 bg-slate-900 border-r border-slate-800 flex flex-col">
            <div class="p-4 border-b border-slate-800 flex justify-between items-center">
                <span class="font-bold text-indigo-400">GEÇMİŞ</span>
                <button onclick="toggleSidebar()">✕</button>
            </div>
            <button onclick="createNewChat()" class="m-4 p-3 bg-indigo-600 rounded-xl font-bold">+ Yeni Sohbet</button>
            <div id="chat-list" class="flex-1 overflow-y-auto px-2"></div>
            <div onclick="adminClickCounter()" class="p-6 border-t border-slate-800 text-[10px] text-slate-500 text-center cursor-pointer">
                DEVELOPED BY: <span class="text-indigo-400">@DGNEMRE_04</span>
            </div>
        </div>

        <header class="p-4 bg-slate-900 border-b border-slate-800 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <button onclick="toggleSidebar()" class="p-2"><i class="fa-solid fa-bars"></i></button>
                <img src="1577.jpg" class="app-logo">
                <span class="font-bold">AVGAX AI</span>
            </div>
            <button onclick="toggleUserSettings()" class="p-3 bg-slate-800 rounded-xl"><i class="fa-solid fa-gear"></i></button>
        </header>

        <main id="chat-box" class="p-4 md:p-8 space-y-6 chat-container"></main>

        <footer class="p-4 bg-slate-900 border-t border-slate-800">
            <div class="max-w-4xl mx-auto">
                <div id="status-msg" class="hidden text-[10px] text-indigo-400 mb-2 animate-pulse font-bold uppercase">Avgax Yanıtlıyor...</div>
                <div class="flex items-center gap-2 bg-slate-800/40 rounded-2xl p-2 border border-slate-700">
                    <input id="user-input" type="text" placeholder="Bir şeyler yaz..." class="flex-1 bg-transparent border-none outline-none py-3 px-2 text-sm text-white">
                    <button onclick="sendMessage()" class="bg-indigo-600 text-white w-12 h-12 rounded-xl flex items-center justify-center"><i class="fa-solid fa-paper-plane"></i></button>
                </div>
            </div>
        </footer>
    </div>

    <script>
        // --- FIREBASE KURULUMU ---
        const firebaseConfig = {
            apiKey: "AIzaSyBIBj5S4_jSwxXvdY86k2gMzcdquL5cW-M",
            authDomain: "avgax-ai.firebaseapp.com",
            projectId: "avgax-ai",
            storageBucket: "avgax-ai.firebasestorage.app",
            messagingSenderId: "743484503071",
            appId: "1:743484503071:web:480e126803c1775148112a",
            measurementId: "G-W6K1GTZ58S"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let isLoginMode = true;
        let currentUser = null;
        let cCount = 0;

        // AUTH MANTIĞI
        function toggleAuthMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-title').innerText = isLoginMode ? "Giriş yapın" : "Yeni hesap oluşturun";
            document.getElementById('auth-btn').innerText = isLoginMode ? "GİRİŞ YAP" : "KAYIT OL";
        }

        async function handleAuth() {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            try {
                if(isLoginMode) { await auth.signInWithEmailAndPassword(email, pass); }
                else { await auth.createUserWithEmailAndPassword(email, pass); }
            } catch(e) { alert("Hata: " + e.message); }
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                currentUser = user;
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('current-user-email').innerText = user.email;
                loadChatsFromCloud();
            } else {
                document.getElementById('auth-screen').style.display = 'flex';
                document.getElementById('main-app').classList.add('hidden');
            }
        });

        function logout() { auth.signOut(); }

        // ADMİN MANTIĞI
        function adminClickCounter() {
            cCount++;
            if(cCount >= 10) {
                const u = prompt("Admin:");
                if(u === "dgnyasin04") {
                    document.getElementById('admin-panel').style.display = 'flex';
                    document.getElementById('admin-prompt').value = localStorage.getItem('avgax_system_prompt') || "Senin adın AVGAX AI'dır. Yapımcın Yasin Emre'dir.";
                    document.getElementById('admin-key').value = localStorage.getItem('avgax_api_key') || "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";
                }
                cCount = 0;
            }
        }
        function closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; }
        function saveAdminSettings() {
            localStorage.setItem('avgax_system_prompt', document.getElementById('admin-prompt').value);
            localStorage.setItem('avgax_api_key', document.getElementById('admin-key').value);
            localStorage.setItem('avgax_ai_model', document.getElementById('admin-model').value);
            alert("Ayarlar kaydedildi!"); closeAdmin();
        }

        // CHAT MANTIĞI
        let allChats = [];
        let currentChatId = null;
        const chatBox = document.getElementById('chat-box');

        async function loadChatsFromCloud() {
            const snapshot = await db.collection('users').doc(currentUser.uid).collection('chats').orderBy('timestamp', 'desc').get();
            allChats = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            renderList();
            if(allChats.length > 0) loadChat(allChats[0].id);
            else createNewChat();
        }

        async function createNewChat() {
            const id = Date.now().toString();
            const newChat = { title: "Yeni Sohbet", messages: [], timestamp: Date.now() };
            await db.collection('users').doc(currentUser.uid).collection('chats').doc(id).set(newChat);
            allChats.unshift({ id, ...newChat });
            currentChatId = id;
            renderList();
            chatBox.innerHTML = '';
            appendMessage('ai', "AVGAX Bulut sistemi hazır. Size nasıl yardımcı olabilirim?", false);
        }

        function loadChat(id) {
            currentChatId = id;
            const chat = allChats.find(c => c.id === id);
            chatBox.innerHTML = '';
            chat.messages.forEach(m => appendMessage(m.role === 'assistant' ? 'ai' : 'user', m.content, false));
            renderList();
        }

        function appendMessage(role, text, saveCloud = true) {
            const wrap = document.createElement('div');
            wrap.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} w-full mb-4`;
            const div = document.createElement('div');
            div.className = `max-w-[85%] p-4 text-sm ${role === 'user' ? 'user-msg' : 'ai-msg'}`;
            
            let htmlContent = role === 'ai' ? marked.parse(text) : text;
            if(role === 'ai') {
                htmlContent = htmlContent.replace(/<pre><code([\s\S]*?)<\/code><\/pre>/g, (match) => {
                    return `<div class="code-wrapper"><button class="copy-code-btn" onclick="copyCode(this)">Kopyala</button>${match}</div>`;
                });
            }
            div.innerHTML = htmlContent;
            wrap.appendChild(div); chatBox.appendChild(wrap);
            chatBox.scrollTop = chatBox.scrollHeight;

            if(saveCloud && currentChatId) {
                const chat = allChats.find(c => c.id === currentChatId);
                chat.messages.push({role: role === 'ai' ? 'assistant' : 'user', content: text});
                if(role === 'user' && chat.title === "Yeni Sohbet") chat.title = text.substring(0,20);
                db.collection('users').doc(currentUser.uid).collection('chats').doc(currentChatId).update({
                    messages: chat.messages,
                    title: chat.title
                });
                renderList();
            }
        }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const val = input.value.trim(); if(!val) return;
            appendMessage('user', val); input.value = '';
            document.getElementById('status-msg').classList.remove('hidden');

            const key = localStorage.getItem('avgax_api_key') || "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";
            const model = localStorage.getItem('avgax_ai_model') || "llama-3.3-70b-versatile";
            const sysPrompt = localStorage.getItem('avgax_system_prompt') || "Sen AVGAX AI'sın.";
            const temp = parseFloat(document.getElementById('temp-slider').value);

            try {
                const chat = allChats.find(c => c.id === currentChatId);
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json', 'Authorization': `Bearer ${key}`},
                    body: JSON.stringify({
                        model: model,
                        temperature: temp,
                        messages: [{role: "system", content: sysPrompt}].concat(chat.messages)
                    })
                });
                const data = await res.json();
                document.getElementById('status-msg').classList.add('hidden');
                appendMessage('ai', data.choices[0].message.content);
            } catch(e) { 
                document.getElementById('status-msg').classList.add('hidden');
                appendMessage('ai', "Bağlantı hatası oluştu."); 
            }
        }

        function copyCode(btn) {
            const code = btn.nextElementSibling.innerText;
            navigator.clipboard.writeText(code);
            btn.innerText = "Kopyalandı!";
            setTimeout(() => btn.innerText = "Kopyala", 2000);
        }

        function renderList() {
            document.getElementById('chat-list').innerHTML = allChats.map(c => `
                <div class="p-3 mb-1 rounded-xl text-xs truncate ${c.id === currentChatId ? 'bg-indigo-600' : 'hover:bg-slate-800'}" onclick="loadChat('${c.id}')">
                    ${c.title}
                </div>
            `).join('');
        }

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
        function toggleUserSettings() { 
            const m = document.getElementById('user-settings-modal');
            m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
        }
        document.getElementById('user-input').addEventListener("keypress", (e) => { if(e.key === 'Enter') sendMessage(); });
        marked.setOptions({ breaks: true });
    </script>
</body>
</html>
