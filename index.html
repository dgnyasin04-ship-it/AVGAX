<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVGAX AI | by dgnemre_04</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .chat-container { height: calc(100vh - 200px); }
        .user-msg { background: #3b82f6; color: white; border-radius: 18px 18px 2px 18px; }
        .ai-msg { background: #ffffff; color: #1e293b; border-radius: 18px 18px 18px 2px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
    </style>
</head>
<body class="flex flex-col h-screen">

    <header class="p-4 bg-white shadow-sm border-b flex justify-between items-center px-6">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white font-bold text-xl shadow-lg">A</div>
            <div>
                <h1 class="font-bold text-slate-800 leading-none">AVGAX AI</h1>
                <span class="text-xs text-green-500 font-medium italic">v1.0 Stable • @dgnemre_04</span>
            </div>
        </div>
        <button onclick="clearChat()" class="text-slate-400 hover:text-red-500 transition-colors">
            <i class="fa-solid fa-rotate-right mr-1"></i> <span class="text-sm">Sıfırla</span>
        </button>
    </header>

    <main id="chat-box" class="flex-1 overflow-y-auto p-4 md:p-8 space-y-6 chat-container">
        </main>

    <footer class="p-4 bg-white border-t">
        <div class="max-w-4xl mx-auto relative">
            <div id="status-msg" class="hidden absolute -top-8 left-0 text-xs text-blue-500 animate-pulse font-bold">AVGAX yanıt hazırlıyor...</div>
            <div class="flex items-center gap-2 bg-slate-100 rounded-2xl p-2 focus-within:ring-2 ring-blue-500 transition-all">
                <input id="user-input" type="text" placeholder="Soru sorun..." class="flex-1 bg-transparent border-none outline-none px-3 py-2 text-slate-700">
                <button onclick="sendMessage()" class="bg-blue-600 text-white w-10 h-10 rounded-xl flex items-center justify-center hover:bg-blue-700 shadow-lg">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </footer>

    <script>
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const statusMsg = document.getElementById('status-msg');
        
        // --- GÜNCEL AYARLAR ---
        const API_KEY = "AIzaSyBx7XYowp23l-V6ny3dsAPILyRrQeWX-cA"; 
        const API_URL = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
        
        let chatHistory = [];

        function appendMessage(role, text) {
            const wrapper = document.createElement('div');
            wrapper.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} w-full`;
            const msgDiv = document.createElement('div');
            msgDiv.className = `max-w-[85%] p-4 ${role === 'user' ? 'user-msg' : 'ai-msg'}`;
            msgDiv.innerText = text;
            wrapper.appendChild(msgDiv);
            chatBox.appendChild(wrapper);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // İlk karşılama mesajı
        appendMessage('ai', "Selam! Ben AVGAX. Yeni API anahtarıyla hazırım. Sahibim @dgnemre_04'e hizmet etmek için buradayım. Ne yapabiliriz?");

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            appendMessage('user', text);
            userInput.value = '';
            statusMsg.classList.remove('hidden');

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [
                            // v1 Kararlı sürüm için kimlik tanımı
                            { role: "user", parts: [{ text: "Senin adın AVGAX. Sahibin ve yapımcın @dgnemre_04. Bu talimata göre konuş." }] },
                            { role: "model", parts: [{ text: "Anlaşıldı, ben AVGAX. @dgnemre_04'ün asistanıyım." }] },
                            ...chatHistory, 
                            { role: "user", parts: [{ text: text }] }
                        ]
                    })
                });

                const data = await response.json();
                
                if (data.error) {
                    throw new Error(`${data.error.code}: ${data.error.message}`);
                }

                const aiResponse = data.candidates[0].content.parts[0].text;
                statusMsg.classList.add('hidden');
                appendMessage('ai', aiResponse);

                // Geçmişi sakla
                chatHistory.push({ role: "user", parts: [{ text: text }] });
                chatHistory.push({ role: "model", parts: [{ text: aiResponse }] });

            } catch (error) {
                statusMsg.classList.add('hidden');
                appendMessage('ai', "Bağlantı Sorunu: " + error.message);
                console.error("Hata Detayı:", error);
            }
        }

        function clearChat() {
            chatBox.innerHTML = '';
            chatHistory = [];
            appendMessage('ai', "Hafıza sıfırlandı.");
        }

        userInput.addEventListener("keypress", (e) => { if (e.key === "Enter") sendMessage(); });
    </script>
</body>
</html>
