<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AVGAX AI | ULTRA</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="AVGAX AI">
    
    <link rel="apple-touch-icon" href="1577.jpg">
    <link rel="icon" type="image/jpeg" href="1577.jpg">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #000; color: white; overflow: hidden; height: 100dvh; display: flex; flex-direction: column; }
        .chat-container { flex: 1; overflow-y: auto; scrollbar-width: thin; scrollbar-color: #334155 transparent; padding-bottom: 20px; }
        .user-msg { background: #1e293b; color: #f1f5f9; border-radius: 18px 18px 2px 18px; border: 1px solid #334155; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .ai-msg { background: #2563eb; color: white; border-radius: 18px 18px 18px 2px; box-shadow: 0 4px 20px rgba(37, 99, 235, 0.3); }
        .ai-msg p { margin-bottom: 0.5rem; }
        .ai-msg pre { background: #0f172a; padding: 1rem; border-radius: 8px; margin: 0.5rem 0; overflow-x: auto; border: 1px solid #1e293b; }
        #sidebar { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); transform: translateX(-100%); z-index: 100; width: 280px; }
        #sidebar.open { transform: translateX(0); }
        .history-item { cursor: pointer; transition: all 0.2s; border: 1px solid transparent; display: flex; align-items: center; justify-content: space-between; padding: 12px; margin-bottom: 4px; }
        .history-item.active { background: #2563eb22; border-color: #2563eb; }
        .delete-btn { color: #f87171; padding: 8px; border-radius: 8px; transition: all 0.2s; background: rgba(239, 68, 68, 0.1); }
        #admin-panel, #user-settings-modal { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.98); z-index: 11000; display: none; flex-direction: column; padding: 2rem; backdrop-filter: blur(15px); }
        .app-logo { width: 42px; height: 42px; border-radius: 10px; object-fit: cover; border: 1px solid rgba(255,255,255,0.15); }
        input[type=range] { -webkit-appearance: none; background: #1e293b; height: 8px; border-radius: 5px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 20px; width: 20px; border-radius: 50%; background: #4f46e5; cursor: pointer; }
    </style>
</head>
<body class="bg-slate-950">

    <div id="user-settings-modal">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-2xl font-bold text-indigo-400 flex items-center gap-2"><i class="fa-solid fa-sliders"></i> AYARLAR</h2>
            <button onclick="toggleUserSettings()" class="text-white bg-slate-800 h-10 w-10 rounded-full flex items-center justify-center"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="space-y-8 max-w-2xl mx-auto w-full">
            <div class="bg-slate-900/50 p-6 rounded-2xl border border-slate-800">
                <label class="block text-sm font-bold text-slate-300 mb-4 uppercase">Ses Seçimi</label>
                <select id="voice-selection" class="w-full bg-slate-950 border border-slate-700 rounded-xl p-4 text-sm text-slate-200"></select>
            </div>
            <div class="bg-slate-900/50 p-6 rounded-2xl border border-slate-800">
                <div class="flex justify-between items-center mb-4">
                    <label class="text-sm font-bold text-slate-300 uppercase">Sıcaklık (Temperature)</label>
                    <span id="temp-value" class="text-indigo-400 font-mono font-bold">0.5</span>
                </div>
                <input type="range" id="temp-slider" min="0" max="2" step="0.1" value="0.5" class="w-full" oninput="updateTempDisplay(this.value)">
            </div>
            <button onclick="saveUserSettings()" class="w-full bg-indigo-600 p-4 rounded-2xl font-bold text-white hover:bg-indigo-500 transition-all">AYARLARI KAYDET</button>
        </div>
    </div>

    <div id="admin-panel">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-2xl font-bold text-indigo-400"><i class="fa-solid fa-user-shield"></i> ADMİN</h2>
            <button onclick="closeAdmin()" class="text-white bg-slate-800 h-10 w-10 rounded-full flex items-center justify-center"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="space-y-6 overflow-y-auto">
            <textarea id="admin-prompt" class="w-full bg-slate-950 border border-slate-700 rounded-xl p-4 h-32 text-sm" placeholder="Sistem Mesajı"></textarea>
            <select id="admin-model" class="w-full bg-slate-950 border border-slate-700 rounded-xl p-4 text-sm text-slate-200">
                <option value="llama-3.3-70b-versatile">Llama 3.3 70B</option>
                <option value="llama3-8b-8192">Llama 3 8B</option>
            </select>
            <input id="admin-key" type="password" class="w-full bg-slate-950 border border-slate-700 rounded-xl p-4 text-sm" placeholder="Groq Key">
            <input id="admin-new-pass" type="password" class="w-full bg-slate-950 border border-slate-700 rounded-xl p-4 text-sm" placeholder="Yeni Admin Şifresi">
            <button onclick="saveAdminSettings()" class="w-full bg-indigo-600 p-4 rounded-2xl font-bold">ADMİN AYARLARINI KAYDET</button>
        </div>
    </div>

    <div id="sidebar" class="fixed inset-y-0 left-0 bg-slate-900 border-r border-slate-800 flex flex-col shadow-2xl">
        <div class="p-4 border-b border-slate-800 flex justify-between items-center">
            <span class="font-bold text-indigo-400 text-sm">SOHBET GEÇMİŞİ</span>
            <button onclick="toggleSidebar()" class="text-slate-400 p-2"><i class="fa-solid fa-chevron-left"></i></button>
        </div>
        <button onclick="createNewChat()" class="m-4 p-4 bg-indigo-600 hover:bg-indigo-500 rounded-2xl flex items-center justify-center gap-3 font-bold text-sm">
            <i class="fa-solid fa-plus-circle text-lg"></i> Yeni Sohbet
        </button>
        <div id="chat-list" class="flex-1 overflow-y-auto px-3 space-y-1"></div>
        <div onclick="adminClickCounter()" class="p-6 border-t border-slate-800 text-[10px] text-slate-500 text-center font-mono cursor-pointer select-none">
            DEVELOPED BY: <span class="text-indigo-500/50">@DGNEMRE_04</span>
        </div>
    </div>

    <header class="p-4 bg-slate-900 border-b border-slate-800 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <button onclick="toggleSidebar()" class="text-slate-300 p-2.5 hover:bg-slate-800 rounded-xl"><i class="fa-solid fa-bars-staggered text-xl"></i></button>
            <img src="1577.jpg" alt="AVGAX" class="app-logo">
            <h1 class="font-bold text-slate-100 hidden sm:block">AVGAX AI</h1>
        </div>
        <div class="flex items-center gap-2">
            <button onclick="toggleUserSettings()" class="text-indigo-400 bg-indigo-500/10 p-3 rounded-2xl border border-indigo-500/20"><i class="fa-solid fa-gear"></i></button>
            <button onclick="clearAllData()" class="text-red-400 bg-red-500/10 p-3 rounded-2xl border border-red-500/20"><i class="fa-solid fa-trash-can"></i></button>
        </div>
    </header>

    <main id="chat-box" class="p-4 md:p-8 space-y-6 chat-container"></main>

    <footer class="p-4 bg-slate-900 border-t border-slate-800">
        <div class="max-w-4xl mx-auto">
            <div id="status-msg" class="hidden text-[10px] text-indigo-400 mb-2 animate-pulse font-bold px-2 uppercase tracking-widest">Yanıt Oluşturuluyor...</div>
            <div class="flex items-center gap-2 bg-slate-800/40 rounded-2xl p-2 border border-slate-700/50">
                <button id="voice-btn" onclick="toggleVoice()" class="text-slate-400 px-3 transition-all"><i class="fa-solid fa-microphone"></i></button>
                <input id="user-input" type="text" placeholder="Mesajınızı yazın..." class="flex-1 bg-transparent border-none outline-none py-3 text-slate-200 text-sm w-full">
                <button onclick="sendMessage()" class="bg-indigo-600 text-white w-12 h-12 rounded-xl flex items-center justify-center active:scale-90"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>
    </footer>

    <script>
        marked.setOptions({ breaks: true });
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const statusMsg = document.getElementById('status-msg');
        const sidebar = document.getElementById('sidebar');
        const chatListContainer = document.getElementById('chat-list');
        const adminPanel = document.getElementById('admin-panel');
        const userSettingsModal = document.getElementById('user-settings-modal');
        const voiceBtn = document.getElementById('voice-btn');
        const voiceSelect = document.getElementById('voice-selection');
        const tempSlider = document.getElementById('temp-slider');
        const tempValue = document.getElementById('temp-value');

        // AYARLAR VE MODALLAR
        function toggleUserSettings() { userSettingsModal.style.display = (userSettingsModal.style.display === 'flex') ? 'none' : 'flex'; if(userSettingsModal.style.display === 'flex') loadUserSettings(); }
        function updateTempDisplay(val) { tempValue.innerText = val; }
        function loadUserSettings() { populateVoices(); tempSlider.value = localStorage.getItem('avgax_user_temp') || 0.5; tempValue.innerText = tempSlider.value; }
        function populateVoices() {
            const voices = window.speechSynthesis.getVoices();
            voiceSelect.innerHTML = '';
            voices.forEach((v, i) => { const opt = document.createElement('option'); opt.value = i; opt.textContent = `${v.name} (${v.lang})`; if(v.lang.includes('tr')) opt.selected = true; voiceSelect.appendChild(opt); });
            if(localStorage.getItem('avgax_user_voice_index')) voiceSelect.value = localStorage.getItem('avgax_user_voice_index');
        }
        window.speechSynthesis.onvoiceschanged = populateVoices;
        function saveUserSettings() { localStorage.setItem('avgax_user_voice_index', voiceSelect.value); localStorage.setItem('avgax_user_temp', tempSlider.value); alert("Ayarlar Kaydedildi"); toggleUserSettings(); }

        // SESLİ YAZMA
        let recognition = null;
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SR(); recognition.lang = 'tr-TR';
            recognition.onresult = (e) => { userInput.value += e.results[0][0].transcript; };
            recognition.onend = () => { voiceBtn.classList.remove('text-red-500', 'animate-pulse'); };
        }
        function toggleVoice() { if(!recognition) return; if(voiceBtn.classList.contains('text-red-500')) { recognition.stop(); } else { recognition.start(); voiceBtn.classList.add('text-red-500', 'animate-pulse'); } }

        // SİDEBAR VE GEÇMİŞ
        function toggleSidebar() { sidebar.classList.toggle('open'); }
        let allChats = JSON.parse(localStorage.getItem('avgax_chats')) || [];
        let currentChatId = localStorage.getItem('avgax_current_id') || null;

        function createNewChat() {
            const id = Date.now().toString();
            allChats.unshift({ id, title: "Yeni Sohbet", messages: [] });
            currentChatId = id;
            saveAndRender();
            chatBox.innerHTML = '';
            appendMessage('ai', "AVGAX AI Hazır. Size nasıl yardımcı olabilirim?", false);
            if(window.innerWidth < 768) sidebar.classList.remove('open');
        }

        function switchChat(id) { currentChatId = id; localStorage.setItem('avgax_current_id', id); renderChatHistory(); renderChatList(); if(window.innerWidth < 768) sidebar.classList.remove('open'); }
        function renderChatHistory() {
            chatBox.innerHTML = '';
            const chat = allChats.find(c => c.id === currentChatId);
            if(chat) chat.messages.forEach(m => appendMessage(m.role === 'assistant' ? 'ai' : 'user', m.content, false));
        }
        function renderChatList() {
            chatListContainer.innerHTML = '';
            allChats.forEach(c => {
                const div = document.createElement('div');
                div.className = `history-item rounded-xl ${c.id === currentChatId ? 'active' : ''}`;
                div.onclick = () => switchChat(c.id);
                div.innerHTML = `<span class="truncate text-xs font-bold">${c.title}</span><button onclick="event.stopPropagation(); deleteChat('${c.id}')" class="delete-btn"><i class="fa-solid fa-trash-can text-[10px]"></i></button>`;
                chatListContainer.appendChild(div);
            });
        }
        function deleteChat(id) { if(confirm("Bu sohbet silinsin mi?")) { allChats = allChats.filter(c => c.id !== id); currentChatId = allChats[0]?.id || null; saveAndRender(); if(!currentChatId) createNewChat(); else renderChatHistory(); } }
        function clearAllData() { if(confirm("TÜM VERİLERİ SIFIRLA?")) { localStorage.clear(); location.reload(); } }

        // MESAJ GÖNDERME
        function appendMessage(role, text, save = true) {
            const wrap = document.createElement('div');
            wrap.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} w-full mb-4`;
            const div = document.createElement('div');
            div.className = `max-w-[85%] p-4 text-sm ${role === 'user' ? 'user-msg' : 'ai-msg'}`;
            div.innerHTML = role === 'ai' ? marked.parse(text) : text.replace(/\n/g, '<br>');
            if(role === 'ai') div.querySelectorAll('pre code').forEach(b => hljs.highlightElement(b));
            wrap.appendChild(div); chatBox.appendChild(wrap); chatBox.scrollTop = chatBox.scrollHeight;
            if(save && currentChatId) {
                const chat = allChats.find(c => c.id === currentChatId);
                chat.messages.push({role: role === 'ai' ? 'assistant' : 'user', content: text});
                if(role === 'user' && chat.title === "Yeni Sohbet") chat.title = text.substring(0, 20);
                saveAndRender();
            }
        }

        async function sendMessage() {
            const val = userInput.value.trim(); if(!val) return;
            if(!currentChatId) createNewChat();
            appendMessage('user', val); userInput.value = ''; statusMsg.classList.remove('hidden');
            const key = localStorage.getItem('avgax_api_key') || "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";
            const model = localStorage.getItem('avgax_ai_model') || "llama-3.3-70b-versatile";
            const temp = parseFloat(localStorage.getItem('avgax_user_temp')) || 0.5;
            const system = localStorage.getItem('avgax_system_prompt') || "Sen AVGAX AI'sın.";

            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
                    body: JSON.stringify({
                        model: model,
                        messages: [{role: "system", content: system}].concat(allChats.find(c => c.id === currentChatId).messages),
                        temperature: temp
                    })
                });
                const data = await res.json();
                statusMsg.classList.add('hidden');
                appendMessage('ai', data.choices[0].message.content);
            } catch (e) { statusMsg.classList.add('hidden'); appendMessage('ai', "Hata: Bağlantı kurulamadı."); }
        }

        // ADMİN
        let cCount = 0;
        function adminClickCounter() { cCount++; if(cCount === 10) { const u = prompt("Yönetici:"); if(u === "dgnyasin04") { const p = prompt("Şifre:"); if(p === (localStorage.getItem('avgax_admin_pass') || "Yasinemre.0404")) openAdmin(); } cCount = 0; } }
        function openAdmin() { adminPanel.style.display = 'flex'; document.getElementById('admin-prompt').value = localStorage.getItem('avgax_system_prompt') || ""; document.getElementById('admin-key').value = localStorage.getItem('avgax_api_key') || ""; }
        function closeAdmin() { adminPanel.style.display = 'none'; }
        function saveAdminSettings() {
            localStorage.setItem('avgax_system_prompt', document.getElementById('admin-prompt').value);
            localStorage.setItem('avgax_api_key', document.getElementById('admin-key').value);
            localStorage.setItem('avgax_ai_model', document.getElementById('admin-model').value);
            if(document.getElementById('admin-new-pass').value) localStorage.setItem('avgax_admin_pass', document.getElementById('admin-new-pass').value);
            alert("Admin Ayarları Kaydedildi"); closeAdmin();
        }

        function saveAndRender() { localStorage.setItem('avgax_chats', JSON.stringify(allChats)); localStorage.setItem('avgax_current_id', currentChatId); renderChatList(); }
        window.onload = () => { if(allChats.length > 0) { renderChatHistory(); renderChatList(); } else { createNewChat(); } };
        userInput.addEventListener("keypress", (e) => { if(e.key === "Enter") sendMessage(); });
    </script>
</body>
  </html>
